---
- name: Upgrade Ollama via Homebrew Cask
  ansible.builtin.command: "{{ homebrew_path }}/bin/brew upgrade --cask ollama-app"
  register: brew_upgrade
  changed_when: "'Already up-to-date' not in brew_upgrade.stdout and 'Warning:' not in brew_upgrade.stderr"
  failed_when: brew_upgrade.rc != 0 and 'already installed' not in brew_upgrade.stderr | lower

- name: Ensure parent directory for the headless Ollama bundle
  ansible.builtin.file:
    path: /opt/purplejay
    state: directory
    owner: root
    group: wheel
    mode: '0755'
  become: yes

# macOS App Management (Ventura+) blocks xattr modifications on anything under
# /Applications/, even as root, so we cannot strip com.apple.quarantine there.
# Mirror the bundle to /opt/purplejay/ (outside App Management's scope) and
# exec from the copy. BSD rsync's -a does NOT include -X (xattrs), so the
# quarantine attribute is dropped at copy time without a separate strip step.
# Developer ID signature + notarization ticket live as regular files inside
# the bundle and are preserved by the mirror.
- name: Mirror Ollama.app out of /Applications to escape App Management
  ansible.builtin.command:
    argv:
      - /usr/bin/rsync
      - -a
      - --delete
      - --itemize-changes
      - /Applications/Ollama.app/
      - /opt/purplejay/Ollama.app/
  become: yes
  register: ollama_mirror
  changed_when: ollama_mirror.stdout | length > 0

- name: Install Ollama LaunchDaemon plist
  ansible.builtin.template:
    src: com.purplejay.ollama.plist.j2
    dest: /Library/LaunchDaemons/com.purplejay.ollama.plist
    owner: root
    group: wheel
    mode: '0644'
  become: yes
  register: ollama_plist

- name: Reload Ollama LaunchDaemon
  when: brew_upgrade.changed or ollama_mirror.changed or ollama_plist.changed
  become: yes
  block:

    - name: Stop any GUI Ollama.app instance (may be holding :11434)
      ansible.builtin.command: killall Ollama
      register: ollama_killall
      failed_when: ollama_killall.rc not in [0, 1]
      changed_when: ollama_killall.rc == 0

    - name: Bootout existing Ollama LaunchDaemon (ignore if not loaded)
      ansible.builtin.command: launchctl bootout system/com.purplejay.ollama
      register: ollama_bootout
      failed_when: false
      changed_when: ollama_bootout.rc == 0

    - name: Bootstrap Ollama LaunchDaemon
      ansible.builtin.command: launchctl bootstrap system /Library/LaunchDaemons/com.purplejay.ollama.plist
      changed_when: true

- name: Wait for Ollama REST API to become available
  ansible.builtin.uri:
    url: "{{ ollama_api_base }}/api/version"
    method: GET
    status_code: 200
  register: api_ready
  until: api_ready.status == 200
  retries: 15
  delay: 3

- name: Assert Ollama API is responding
  ansible.builtin.assert:
    that:
      - api_ready.json.version is defined
    success_msg: "Ollama API is up (version {{ api_ready.json.version }})"
    fail_msg: "Ollama API did not return a version"

- name: Pull / update required models in background
  ansible.builtin.uri:
    url: "{{ ollama_api_base }}/api/pull"
    method: POST
    body_format: json
    body:
      model: "{{ item }}"
      stream: false
    timeout: 7200
    status_code: 200
  loop: "{{ ollama_models }}"
  async: 10800
  poll: 0
  register: ollama_pull_jobs

- name: Show background pull job IDs
  ansible.builtin.debug:
    msg: "Started pull for {{ item.item }} as job {{ item.ansible_job_id }}"
  loop: "{{ ollama_pull_jobs.results }}"
  loop_control:
    label: "{{ item.item }}"

- name: Wait for model pulls to finish
  ansible.builtin.async_status:
    jid: "{{ item.ansible_job_id }}"
  register: ollama_pull_status
  until: ollama_pull_status.finished
  retries: 720
  delay: 60
  loop: "{{ ollama_pull_jobs.results }}"
  loop_control:
    label: "{{ item.item }}"

- name: Keep required models warm in memory via REST API
  ansible.builtin.uri:
    url: "{{ ollama_api_base }}/api/generate"
    method: POST
    body_format: json
    body:
      model: "{{ item }}"
      prompt: ""
      stream: false
      keep_alive: "{{ ollama_keep_alive }}"
    timeout: 600
    status_code: 200
  loop: "{{ ollama_keepalive_models }}"

- name: Remove absent models
  block:
    - name: Fetch installed model list
      ansible.builtin.uri:
        url: "{{ ollama_api_base }}/api/tags"
        method: GET
        status_code: 200
      register: tags_response

    - name: Delete models that must not exist
      ansible.builtin.uri:
        url: "{{ ollama_api_base }}/api/delete"
        method: DELETE
        body_format: json
        body:
          model: "{{ item }}"
        status_code: 200
      loop: "{{ ollama_absent_models }}"
      when: item in (tags_response.json.models | map(attribute='name') | list)
  when: ollama_absent_models is defined and ollama_absent_models | length > 0
