---
- name: Upgrade Ollama via Homebrew Cask
  ansible.builtin.command: "{{ homebrew_path }}/bin/brew upgrade --cask ollama-app"
  register: brew_upgrade
  changed_when: "'Already up-to-date' not in brew_upgrade.stdout and 'Warning:' not in brew_upgrade.stderr"
  failed_when: brew_upgrade.rc != 0 and 'already installed' not in brew_upgrade.stderr | lower

- name: Set Ollama environment variables (user Aqua session)
  include_tasks: utilities/user_aqua_env.yml
  when: ollama_expose
  loop:
    - { name: OLLAMA_HOST, value: "{{ ollama_host }}" }
    - { name: OLLAMA_KEEP_ALIVE, value: "{{ ollama_keep_alive }}" }

- name: Restart Ollama after upgrade or env change
  block:

    - name: Kill existing Ollama process (if running)
      ansible.builtin.command: killall Ollama
      register: kill_result
      failed_when: kill_result.rc not in [0, 1]
      changed_when: kill_result.rc == 0

    - name: Pause to allow process to fully exit
      ansible.builtin.pause:
        seconds: 3

    - name: Launch Ollama app
      ansible.builtin.command: /usr/bin/open -a /Applications/Ollama.app
      changed_when: true

    - name: Wait for Ollama REST API to become available
      ansible.builtin.uri:
        url: "{{ ollama_api_base }}/api/version"
        method: GET
        status_code: 200
      register: api_ready
      until: api_ready.status == 200
      retries: 15
      delay: 3

    - name: Assert Ollama API is responding
      ansible.builtin.assert:
        that:
          - api_ready.json.version is defined
        success_msg: "Ollama API is up (version {{ api_ready.json.version }})"
        fail_msg: "Ollama API did not return a version"

  when: brew_upgrade.changed or ollama_expose

- name: Pull / update required models in background
  ansible.builtin.uri:
    url: "{{ ollama_api_base }}/api/pull"
    method: POST
    body_format: json
    body:
      model: "{{ item }}"
      stream: false
    timeout: 7200
    status_code: 200
  loop: "{{ ollama_models }}"
  async: 10800
  poll: 0
  register: ollama_pull_jobs

- name: Show background pull job IDs
  ansible.builtin.debug:
    msg: "Started pull for {{ item.item }} as job {{ item.ansible_job_id }}"
  loop: "{{ ollama_pull_jobs.results }}"
  loop_control:
    label: "{{ item.item }}"

- name: Wait for model pulls to finish
  ansible.builtin.async_status:
    jid: "{{ item.ansible_job_id }}"
  register: ollama_pull_status
  until: ollama_pull_status.finished
  retries: 720
  delay: 60
  loop: "{{ ollama_pull_jobs.results }}"
  loop_control:
    label: "{{ item.item }}"

- name: Keep required models warm in memory via REST API
  ansible.builtin.uri:
    url: "{{ ollama_api_base }}/api/generate"
    method: POST
    body_format: json
    body:
      model: "{{ item }}"
      prompt: ""
      stream: false
      keep_alive: "{{ ollama_keep_alive }}"
    timeout: 600
    status_code: 200
  loop: "{{ ollama_keepalive_models }}"

- name: Remove absent models
  block:
    - name: Fetch installed model list
      ansible.builtin.uri:
        url: "{{ ollama_api_base }}/api/tags"
        method: GET
        status_code: 200
      register: tags_response

    - name: Delete models that must not exist
      ansible.builtin.uri:
        url: "{{ ollama_api_base }}/api/delete"
        method: DELETE
        body_format: json
        body:
          model: "{{ item }}"
        status_code: 200
      loop: "{{ ollama_absent_models }}"
      when: item in (tags_response.json.models | map(attribute='name') | list)
  when: ollama_absent_models is defined and ollama_absent_models | length > 0