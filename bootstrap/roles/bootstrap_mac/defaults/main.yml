---
node_type: 'employee'

# Environment
three_finger_drag: true
single_touch_tap: true
search_folder: SCcf
show_status_bar: true
new_window_target: PfDe
fn_as_standard_keys: 0
mouse_button_mode: OneButton
safari_developer_menu: true
finder_show_all_files: false
zprofile_user: ""
bind_yk: true
use_keyboard_fn_keys: true
auto_hide_dock: true

# Local Development
localhost_aliases:
  - nats.local

# git
git_config: {}
# Schema
# user_name: John Doe
# email: jd@purplejay.io

repos: []
# Schema
#  - name: 'ansible-collections'
#    url: git@gitlab.purplejay.io:keystone/ansible-collections.git
#    group: keystone

# Packages
brew_cask_packages_removed: []
brew_cask_packages:
  - 1password
  - visual-studio-code
  - 1password-cli
brew_cask_packages_user: []
brew_cask_packages_force: []
brew_packages:
  - node@22
  - jq
  - mkcert
  - kubectl
  - s5cmd
  - sshpass
brew_packages_removed: []
brew_packages_user: []
brew_pinned_packages: []
# - name: prometheus
#   version: x.x.x
pip_packages: []
pip_packages_removed: []
mas_apps: []
mas_apps_removed: []

# Hardening
ssh_authorized_keys: []
harden_ssh: true
protect_screen_sharing: no

# Power Management
prevent_auto_sleep: no
prevent_disk_sleep: no
autorestart: yes
wake_network_activity: yes
auto_sleep_schedule: no
auto_sleep_schedule_command: ""
#Example: sleep MTWRFSU 19:00:00
auto_wake_poweron_schedule: no
auto_wake_poweron_schedule_command: ""
#Example: wakeorpoweron MTWRFSU 08:00:00

# SMB Mounts
smb_mounts: []
#  - name: pjstack
#    hostname: nas.purplejay.net
#  - name: macOS-TM
#    hostname: nas.purplejay.net

# Parallels
check_parallels: no

# Miscellaneous
gitlab_api_token: 'please_update_user_yml'

# SSH Tunnels
ssh_tunnels: []
#  - host: pj-dns
#    port: 8900

# Ollama
ollama_install: no
ollama_expose: no
ollama_models: []
ollama_absent_models: []
ollama_host: "0.0.0.0"
ollama_keep_alive: "24h"
ollama_api_base: "http://127.0.0.1:11434"  # used for all API calls in the playbook
# "latest" resolves to the newest GitHub release at run time. Override with a
# specific version string (e.g. "0.21.2") to pin. When pinning, optionally set
# ollama_darwin_tgz_sha256 to enforce byte-level reproducibility; codesign
# --verify always runs regardless.
ollama_version: "latest"
ollama_darwin_tgz_sha256: ""
ollama_install_dir: "/opt/purplejay/ollama"

# OS Update
os_upgrade: false
trust_letsencrypt_staging: false


upgrade_packages: false